<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Spoon Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-amber-50 text-gray-900">
    <header class="bg-white shadow">
      <div class="mx-auto max-w-6xl px-4 py-6">
        <h1 class="text-3xl font-bold">Green Spoon Bistro</h1>
        <p class="text-gray-600">Fresh, seasonal favorites</p>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-10">
      <section aria-labelledby="menu-title">
        <h2 id="menu-title" class="text-2xl font-semibold mb-6">Featured Dishes</h2>
        <div class="grid gap-6 md:grid-cols-2">
          <a href="dish1.html" class="group rounded-2xl bg-white shadow hover:shadow-lg transition">
            <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&w=900&q=80" alt="Herb roasted salmon" class="h-52 w-full rounded-t-2xl object-cover" />
            <div class="p-4">
              <h3 class="text-xl font-semibold group-hover:text-emerald-600">Herb Roasted Salmon</h3>
              <p class="text-gray-600">Citrus glaze, seasonal vegetables</p>
            </div>
          </a>
          <a href="dish2.html" class="group rounded-2xl bg-white shadow hover:shadow-lg transition">
            <img src="https://images.unsplash.com/photo-1476224203421-9ac39bcb3327?auto=format&fit=crop&w=900&q=80" alt="Truffle mushroom pasta" class="h-52 w-full rounded-t-2xl object-cover" />
            <div class="p-4">
              <h3 class="text-xl font-semibold group-hover:text-emerald-600">Truffle Mushroom Pasta</h3>
              <p class="text-gray-600">Creamy sauce, parmesan</p>
            </div>
          </a>
          <a href="dish3.html" class="group rounded-2xl bg-white shadow hover:shadow-lg transition">
            <img src="https://images.unsplash.com/photo-1466978913421-dad2ebd01d17?auto=format&fit=crop&w=900&q=80" alt="Spiced chickpea bowl" class="h-52 w-full rounded-t-2xl object-cover" />
            <div class="p-4">
              <h3 class="text-xl font-semibold group-hover:text-emerald-600">Spiced Chickpea Bowl</h3>
              <p class="text-gray-600">Quinoa, roasted vegetables</p>
            </div>
          </a>
          <a href="dish4.html" class="group rounded-2xl bg-white shadow hover:shadow-lg transition">
            <img src="https://images.unsplash.com/photo-1490474418585-ba9bad8fd0ea?auto=format&fit=crop&w=900&q=80" alt="Lemon ricotta pancakes" class="h-52 w-full rounded-t-2xl object-cover" />
            <div class="p-4">
              <h3 class="text-xl font-semibold group-hover:text-emerald-600">Lemon Ricotta Pancakes</h3>
              <p class="text-gray-600">Berry compote, maple</p>
            </div>
          </a>
        </div>
      </section>
    </main>

    <footer class="bg-white border-t">
      <div class="mx-auto max-w-6xl px-4 py-6 text-sm text-gray-500">Open daily · 10am – 10pm</div>
    </footer>
  </body>
</html>
