<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citrus Green Salad - Cozy Bistro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="bg-white shadow-sm">
    <div class="mx-auto flex max-w-4xl items-center justify-between px-6 py-4">
      <h1 class="text-2xl font-semibold">Cozy Bistro</h1>
      <nav class="text-sm text-slate-600">
        <a href="menu-index.html" class="hover:text-slate-900">Menu</a>
        <span class="mx-2">/</span>
        <a href="menu-with-sidebar.html" class="hover:text-slate-900">Menu with Sidebar</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-4xl px-6 py-10">
    <article class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
      <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=1000&q=80" alt="Citrus Green Salad" class="h-72 w-full rounded-xl object-cover" />
      <h2 class="mt-6 text-2xl font-semibold">Citrus Green Salad</h2>
      <p class="mt-3 text-slate-700">Crisp greens with orange segments, cucumber ribbons, toasted seeds, and a bright citrus vinaigrette.</p>
      <p class="mt-4 text-sm text-slate-500">Add grilled halloumi for extra richness.</p>
    </article>
  </main>
</body>
</html>
