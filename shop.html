<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop - Cozy Market</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <nav class="bg-white shadow-sm">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
      <div>
        <h1 class="text-2xl font-semibold">Cozy Market</h1>
        <p class="text-sm text-slate-500">Fresh pantry staples delivered daily.</p>
      </div>
      <a href="cart.html" class="text-sm font-medium text-slate-600 hover:text-slate-900">View Cart</a>
    </div>
  </nav>

  <main class="mx-auto max-w-6xl px-6 py-10">
    <section aria-labelledby="products">
      <h2 id="products" class="text-xl font-semibold">Shop Products</h2>
      <div class="mt-6 grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3" id="product-grid"></div>
    </section>
  </main>

  <script>
    const products = [
      { id: 1, name: "Artisan Olive Oil", price: 12.99, image: "https://images.unsplash.com/photo-1510626176961-4b57d4fbad03?auto=format&fit=crop&w=800&q=80" },
      { id: 2, name: "Organic Pasta", price: 6.5, image: "https://images.unsplash.com/photo-1526318896980-cf78c088247c?auto=format&fit=crop&w=800&q=80" },
      { id: 3, name: "Spice Blend Set", price: 9.25, image: "https://images.unsplash.com/photo-1505576391880-b3f9d713dc4f?auto=format&fit=crop&w=800&q=80" },
      { id: 4, name: "Seasonal Produce Box", price: 18.0, image: "https://images.unsplash.com/photo-1506807803488-8eafc15316c1?auto=format&fit=crop&w=800&q=80" },
      { id: 5, name: "Citrus Infused Tea", price: 7.75, image: "https://images.unsplash.com/photo-1505751172876-fa1923c5c528?auto=format&fit=crop&w=800&q=80" },
      { id: 6, name: "Gourmet Chocolate", price: 5.5, image: "https://images.unsplash.com/photo-1470337458703-46ad1756a187?auto=format&fit=crop&w=800&q=80" }
    ];

    const grid = document.getElementById("product-grid");

    function getCart() {
      return JSON.parse(localStorage.getItem("cozyCart") || "[]");
    }

    function setCart(cart) {
      localStorage.setItem("cozyCart", JSON.stringify(cart));
    }

    function addToCart(product) {
      const cart = getCart();
      const existing = cart.find((item) => item.id === product.id);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ ...product, quantity: 1 });
      }
      setCart(cart);
      alert(`${product.name} added to cart.`);
    }

    products.forEach((product) => {
      const card = document.createElement("article");
      card.className = "rounded-2xl border border-slate-200 bg-white p-4 shadow-sm";
      card.innerHTML = `
        <img src="${product.image}" alt="${product.name}" class="h-40 w-full rounded-xl object-cover" />
        <h3 class="mt-4 text-lg font-semibold">${product.name}</h3>
        <p class="text-sm text-slate-600">$${product.price.toFixed(2)}</p>
        <button class="mt-4 w-full rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800">Add to Cart</button>
      `;
      card.querySelector("button").addEventListener("click", () => addToCart(product));
      grid.appendChild(card);
    });
  </script>
</body>
</html>
